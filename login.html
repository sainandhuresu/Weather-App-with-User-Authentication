<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Weather Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="glass-panel">
    <h1 class="title">Welcome Back</h1>

    {% with messages = get_flashed_messages(category_filter=["error"]) %}
    {% if messages %}
    <div
      style="color: var(--danger-color); margin-bottom: 1rem; text-align: center; border: 1px solid var(--danger-color); padding: 0.5rem; border-radius: 8px; background: rgba(239, 68, 68, 0.1);">
      {% for message in messages %}
      {{ message }}
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Log In</button>
      <p class="link-text">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
    </form>
  </div>
</body>

</html>
